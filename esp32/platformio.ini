; SmartLED ESP32 - PlatformIO 設定
; ライブラリバージョンは platformio.ini で固定管理する（rules/200-esp32-device.mdc 参照）

[env:smartled]
platform  = espressif32
board     = esp32dev
framework = arduino
monitor_speed = 115200

build_flags =
  -D DEBUG_MODE

lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7.0
