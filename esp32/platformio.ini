; SmartLED ESP32 - PlatformIO 設定
; ライブラリバージョンは platformio.ini で固定管理する（rules/200-esp32-device.mdc 参照）

[env:smartled]
; WLED が Tasmota フォーク版をキャッシュするため、公式版をバージョン固定で明示する
; （バージョン未指定だと Tasmota 版に解決され WiFiClientSecure.h が見つからない）
platform  = espressif32@6.9.0
board     = esp32dev
framework = arduino
monitor_speed = 115200

; アップロードポートは PlatformIO 拡張の Upload ボタンで自動検出される。
; 複数 USB 機器などで自動検出に失敗するときは、VS Code の PlatformIO パネルで
; 「Pick a port」を選ぶか、下行のコメントを外して COM 番号を指定する（例: COM5）
; upload_port = COM5

build_flags =
  -D DEBUG_MODE

lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7.0
