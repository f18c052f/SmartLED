name: CI

on:
  push:
    branches-ignore:
      - main        # main への直接 push は保護済みのため除外
  pull_request:
    branches:
      - main        # main へのマージ前に必ず検証

jobs:
  test:
    name: Build & Test (aws/)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: aws/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: aws

      - name: Build
        run: npm run build
        working-directory: aws

      - name: Test
        run: npm run test
        working-directory: aws
